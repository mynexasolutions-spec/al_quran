<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="16" fill="#0d4a3f"/>
  <!-- Microphone body -->
  <rect x="83" y="44" width="34" height="56" rx="17" fill="#c9a84c" opacity=".9"/>
  <rect x="88" y="48" width="24" height="46" rx="12" fill="#1a6b57"/>
  <!-- Microphone stand arc -->
  <path d="M66 108 Q66 136 100 136 Q134 136 134 108" stroke="#c9a84c" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Stand line -->
  <line x1="100" y1="136" x2="100" y2="154" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="80" y1="154" x2="120" y2="154" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>
  <!-- Sound lines -->
  <path d="M52 84 Q44 100 52 116" stroke="#f5dfa0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".5"/>
  <path d="M148 84 Q156 100 148 116" stroke="#f5dfa0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".5"/>
  <!-- dots representing recitation styles -->
  <circle cx="94" cy="64" r="3" fill="#c9a84c" opacity=".7"/>
  <circle cx="100" cy="64" r="3" fill="#c9a84c" opacity=".7"/>
  <circle cx="106" cy="64" r="3" fill="#c9a84c" opacity=".7"/>
</svg>
