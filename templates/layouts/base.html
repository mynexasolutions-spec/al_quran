<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Al-Qur'an Global Institute{% endblock %}</title>
  <!-- Favicons -->
  <link rel="icon" type="image/x-icon"       href="{{ url_for('static', filename='images/favicon/favicon.ico') }}"/>
  <link rel="icon" type="image/png" sizes="16x16"  href="{{ url_for('static', filename='images/favicon/favicon-16x16.png') }}"/>
  <link rel="icon" type="image/png" sizes="32x32"  href="{{ url_for('static', filename='images/favicon/favicon-32x32.png') }}"/>
  <link rel="apple-touch-icon" sizes="180x180"     href="{{ url_for('static', filename='images/favicon/apple-touch-icon.png') }}"/>
  <link rel="manifest" href="{{ url_for('static', filename='images/favicon/site.webmanifest') }}"/>
  <meta name="theme-color" content="#0A3D33"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ══ LANGUAGE BAR ══ -->
  <div class="lang-bar" id="langBar">
    <span class="lang-bar-label" data-i18n="langBarLabel">🌐 Select Language:</span>
    <div class="lang-toggle" id="langToggle" role="group" aria-label="Language selection">
      <button class="lang-btn lang-btn--active" id="btnEn" data-lang="en">English</button>
      <button class="lang-btn" id="btnUr" data-lang="ur">اردو</button>
    </div>
  </div>

  {% include 'components/navbar.html' %}

  <!-- ══ PAGE CONTENT ══ -->
  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}
  {% include 'components/whatsapp_float.html' %}

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
